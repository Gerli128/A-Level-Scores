<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CIE A Level Score calculator</title>
  <style>
    :root{--bg:#071226;--card:#0b1726;--muted:#9fb0c8;--accent:#60a5fa;--text:#e8f2fb;--big:30px;--med:16px}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#061225,#08172a);color:var(--text);font-family:Inter,system-ui,Roboto,Arial,sans-serif;padding:18px}
    .wrap{max-width:980px;margin:0 auto}
    .card{background:var(--card);padding:14px;border-radius:10px;margin:10px 0;border:1px solid rgba(255,255,255,0.03)}
    h1{margin:0 0 8px;font-size:20px}
    label{display:block;font-weight:700;margin-top:8px;font-size:0.95rem}
    select,input{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:#071b2a;color:var(--text);font-size:14px}
    .primaryBtns{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
    .primaryBtn{flex:1;min-width:120px;padding:12px;border-radius:10px;border:0;background:#163a57;color:var(--text);font-weight:800;cursor:pointer;font-size:15px}
    .primaryBtn.active{background:var(--accent);color:#04203a}
    .subBtns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .subBtn{padding:8px 10px;border-radius:8px;border:0;background:#0f2b3f;color:var(--text);cursor:pointer}
    .subBtn.active{background:#1f6fd8;color:#04203a}
    .row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
    .btn{background:var(--accent);border:0;padding:10px 12px;border-radius:8px;color:#04203a;font-weight:700;cursor:pointer}
    .small{font-size:0.9rem;color:var(--muted)}
    .outputBox{background:rgba(255,255,255,0.02);padding:18px;border-radius:10px;margin-top:10px;border:1px solid rgba(255,255,255,0.03);text-align:center}
    .bigText{font-size:var(--big);font-weight:900;margin:6px 0}
    .subText{font-size:var(--med);color:var(--muted);margin:4px 0}
    .paper-row{display:flex;gap:8px;align-items:center;margin-top:8px}
    .paper-row input{width:140px}
    .notesLink{display:block;margin-top:8px;color:var(--accent);font-weight:700;text-decoration:none}
    .notesMessage{margin-top:8px;color:var(--muted)}
    .sectionTitle{font-weight:800;margin-top:2px}
    @media (max-width:820px){ .paper-row{flex-direction:column;align-items:flex-start} .paper-row input{width:100%} .bigText{font-size:24px} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>CIE A Level Score calculator</h1>
      <div class="small">Two actions: (A) Enter your predicted raw marks. (B) Enter score your aiming for (overall or per paper).</div>
    </div>

    <div class="card">
      <label for="subject">Subject</label>
      <select id="subject"></select>

      <label>Series</label>
      <div class="primaryBtns">
        <button id="btnMJ" class="primaryBtn active">MJ</button>
        <button id="btnON" class="primaryBtn">ON</button>
      </div>

      <label for="asScore">Enter your AS score (the number on your AS statement - integer 0 to 100)</label>
      <input id="asScore" type="number" min="0" max="100" step="1" placeholder="e.g. 82">
    </div>

    <div class="card" id="notesCard">
      <label>Notes</label>
      <div id="notesContent" class="notesMessage">No notes yet.</div>
    </div>

    <div class="card">
      <label>Choose action</label>
      <div class="primaryBtns">
        <button id="btnPred" class="primaryBtn active">Enter predicted A2 raw marks</button>
        <button id="btnTarget" class="primaryBtn">Enter score your Aiming for</button>
      </div>

      <div id="predictedArea" style="margin-top:12px">
        <div id="predictedPapersArea" style="margin-top:8px"></div>
        <div class="row"><button id="calcPred" class="btn">Get final grade & PUM</button></div>
      </div>

      <div id="targetArea" style="display:none;margin-top:12px">
        <div class="subBtns">
          <button id="subOverall" class="subBtn active">Overall target</button>
          <button id="subPaper1" class="subBtn">Paper target 1</button>
          <button id="subPaper2" class="subBtn">Paper target 2</button>
        </div>

        <div id="overallTarget" style="margin-top:10px">
          <label for="targetOverall">Enter target grade or PUM (A*/A/B/C/D/E or integer PUM)</label>
          <input id="targetOverall" placeholder="e.g. B or 90">
          <div class="row"><button id="calcOverall" class="btn">Get A2 raw needed</button></div>
        </div>

        <div id="paper1Target" style="display:none;margin-top:10px">
          <label for="targetPaper1">Enter target grade or PUM (A*/A/B/C/D/E or integer PUM)</label>
          <input id="targetPaper1" placeholder="e.g. B or 90">
          <label id="paper1FixedLabel" for="paper1Fixed" style="margin-top:8px">Enter fixed paper raw (max: -)</label>
          <input id="paper1Fixed" type="number" step="1" min="0" placeholder="e.g. 42">
          <div class="row"><button id="calcPaper1Target" class="btn">Calculate needed raw</button></div>
        </div>

        <div id="paper2Target" style="display:none;margin-top:10px">
          <label for="targetPaper2">Enter target grade or PUM (A*/A/B/C/D/E or integer PUM)</label>
          <input id="targetPaper2" placeholder="e.g. B or 90">
          <label id="paper2FixedLabel" for="paper2Fixed" style="margin-top:8px">Enter fixed paper raw (max: -)</label>
          <input id="paper2Fixed" type="number" step="1" min="0" placeholder="e.g. 42">
          <div class="row"><button id="calcPaper2Target" class="btn">Calculate needed raw</button></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="outputBox">
        <div id="mainOutput" class="bigText">No calculation yet.</div>
        <div id="subOutput" class="subText"></div>
      </div>
    </div>
  </div>

<script>
function makeAnchors(points, maxRaw){
  return [
    {raw:0, pum:0},
    {raw:points.e, pum:40},
    {raw:points.d, pum:50},
    {raw:points.c, pum:60},
    {raw:points.b, pum:70},
    {raw:points.a, pum:80},
    {raw:points.aStar, pum:90},
    {raw:maxRaw, pum:100}
  ];
}

function makeSeries(maxRaw, asMaxRaw, alevelPoints, asPoints, papers){
  return {
    alevel:{max_raw:maxRaw, anchors:makeAnchors(alevelPoints, maxRaw)},
    as:{max_raw:asMaxRaw, anchors:makeAnchors(asPoints, asMaxRaw)},
    a2_papers:papers
  };
}

function interpRawToPum(anchors, raw){
  if(!anchors) return null;
  const pts = anchors.slice().sort((a,b)=>a.raw-b.raw);
  if(raw <= pts[0].raw) return Math.floor(pts[0].pum);
  if(raw >= pts[pts.length-1].raw) return Math.floor(pts[pts.length-1].pum);
  for(let i=0;i<pts.length-1;i++){
    const A = pts[i], B = pts[i+1];
    if(raw >= A.raw && raw <= B.raw){
      const t = (raw - A.raw) / (B.raw - A.raw);
      return Math.floor(A.pum + t*(B.pum - A.pum));
    }
  }
  return null;
}

function interpPumToRawNearest(anchors, pum){
  if(!anchors) return null;
  const pts = anchors.slice().sort((a,b)=>a.pum-b.pum);
  if(pum <= pts[0].pum) return Math.round(pts[0].raw);
  if(pum >= pts[pts.length-1].pum) return Math.round(pts[pts.length-1].raw);
  for(let i=0;i<pts.length-1;i++){
    const A = pts[i], B = pts[i+1];
    if(pum >= A.pum && pum <= B.pum){
      const t = (pum - A.pum) / (B.pum - A.pum);
      return Math.round(A.raw + t*(B.raw - A.raw));
    }
  }
  return null;
}

function pumToGrade(pum){
  if(pum >= 90) return 'A*';
  if(pum >= 80) return 'A';
  if(pum >= 70) return 'B';
  if(pum >= 60) return 'C';
  if(pum >= 50) return 'D';
  if(pum >= 40) return 'E';
  return 'U';
}

function parseTargetPum(t){
  const gradeMap = {'A*':90,'A':80,'B':70,'C':60,'D':50,'E':40};
  const trimmed = (t || '').trim();
  if(/^[0-9]+$/.test(trimmed)) return Number(trimmed);
  const up = trimmed.toUpperCase();
  if(gradeMap[up] !== undefined) return gradeMap[up];
  return null;
}

const subjectSel = document.getElementById('subject');
const asScoreInput = document.getElementById('asScore');
const btnMJ = document.getElementById('btnMJ');
const btnON = document.getElementById('btnON');
const btnPred = document.getElementById('btnPred');
const btnTarget = document.getElementById('btnTarget');
const predictedArea = document.getElementById('predictedArea');
const targetArea = document.getElementById('targetArea');
const predictedPapersArea = document.getElementById('predictedPapersArea');
const calcPred = document.getElementById('calcPred');
const subOverall = document.getElementById('subOverall');
const subPaper1 = document.getElementById('subPaper1');
const subPaper2 = document.getElementById('subPaper2');
const overallTarget = document.getElementById('overallTarget');
const paper1Target = document.getElementById('paper1Target');
const paper2Target = document.getElementById('paper2Target');
const targetOverall = document.getElementById('targetOverall');
const targetPaper1 = document.getElementById('targetPaper1');
const targetPaper2 = document.getElementById('targetPaper2');
const paper1Fixed = document.getElementById('paper1Fixed');
const paper2Fixed = document.getElementById('paper2Fixed');
const paper1FixedLabel = document.getElementById('paper1FixedLabel');
const paper2FixedLabel = document.getElementById('paper2FixedLabel');
const calcOverall = document.getElementById('calcOverall');
const calcPaper1Target = document.getElementById('calcPaper1Target');
const calcPaper2Target = document.getElementById('calcPaper2Target');
const mainOutput = document.getElementById('mainOutput');
const subOutput = document.getElementById('subOutput');
const notesContent = document.getElementById('notesContent');

let currentSeries = 'MJ';
let currentTargetMode = 'overall';

function getSubjData(){
  const subj = subjectSel.value;
  return DATA[subj][currentSeries];
}

function getPapers(){
  const subjData = getSubjData();
  return subjData.a2_papers || [];
}

function resetOutputs(){
  mainOutput.textContent = 'No calculation yet.';
  subOutput.textContent = '';
}

function updateNotes(){
  const subj = subjectSel.value;
  if(NOTES[subj] !== undefined){
    notesContent.innerHTML = NOTES[subj];
  } else {
    notesContent.textContent = 'No notes available for this subject.';
  }
}

function buildSubjects(){
  Object.keys(DATA).forEach(k=>{
    const o = document.createElement('option');
    o.value = k;
    o.textContent = k;
    subjectSel.appendChild(o);
  });
  subjectSel.value = Object.keys(DATA)[0];
}

function buildPredictedPapersUI(){
  const papers = getPapers();
  predictedPapersArea.innerHTML = '';

  if(!papers || papers.length === 0){
    predictedPapersArea.innerHTML = '<div class="small">No A2 paper configuration.</div>';
    return;
  }

  papers.forEach((p)=>{
    const row = document.createElement('div');
    row.className = 'paper-row';

    const title = document.createElement('div');
    title.style.minWidth = '280px';
    title.textContent = `Predicted ${p.name} raw (max: ${p.max})`;

    const inp = document.createElement('input');
    inp.type = 'number';
    inp.step = '1';
    inp.min = '0';
    inp.max = p.max;
    inp.placeholder = `0 to ${p.max}`;

    row.appendChild(title);
    row.appendChild(inp);
    predictedPapersArea.appendChild(row);
  });
}

function updateSeriesButtons(){
  if(currentSeries === 'MJ'){
    btnMJ.classList.add('active');
    btnON.classList.remove('active');
  } else {
    btnON.classList.add('active');
    btnMJ.classList.remove('active');
  }
}

function updateTargetButtonLabels(){
  const papers = getPapers();
  if(papers.length < 2) return;

  subPaper1.textContent = `${papers[0].name} target`;
  subPaper2.textContent = `${papers[1].name} target`;

  paper1FixedLabel.textContent = `Enter ${papers[1].name} raw (max: ${papers[1].max})`;
  paper2FixedLabel.textContent = `Enter ${papers[0].name} raw (max: ${papers[0].max})`;

  paper1Fixed.max = papers[1].max;
  paper2Fixed.max = papers[0].max;

  calcPaper1Target.textContent = `Calculate ${papers[0].name} needed`;
  calcPaper2Target.textContent = `Calculate ${papers[1].name} needed`;
}

function updateTargetModeView(){
  subOverall.classList.toggle('active', currentTargetMode === 'overall');
  subPaper1.classList.toggle('active', currentTargetMode === 'paper1');
  subPaper2.classList.toggle('active', currentTargetMode === 'paper2');

  overallTarget.style.display = currentTargetMode === 'overall' ? 'block' : 'none';
  paper1Target.style.display = currentTargetMode === 'paper1' ? 'block' : 'none';
  paper2Target.style.display = currentTargetMode === 'paper2' ? 'block' : 'none';
}

function refreshAllUI(){
  buildPredictedPapersUI();
  updateTargetButtonLabels();
  updateTargetModeView();
  updateNotes();
  resetOutputs();
}

function updateTargetInputsWithAchieved(finalPum){
  const achievedText = pumToGrade(finalPum);
  const numeric = s => /^[0-9]+$/.test((s || '').trim());
  [targetOverall, targetPaper1, targetPaper2].forEach(inp=>{
    if(!inp || !inp.value || inp.value.trim() === '') return;
    inp.value = numeric(inp.value) ? String(finalPum) : achievedText;
  });
}

calcPred.addEventListener('click', ()=>{
  const subjData = getSubjData();
  const asVal = Number(asScoreInput.value);
  if(!Number.isInteger(asVal) || asVal < 0 || asVal > 100){
    alert('Enter AS score as integer 0 to 100');
    return;
  }

  const estASraw = interpPumToRawNearest(subjData.as.anchors, asVal);
  const papers = subjData.a2_papers || [];
  const rows = predictedPapersArea.querySelectorAll('.paper-row');

  let a2Sum = 0;
  for(let i = 0; i < papers.length; i++){
    const inp = rows[i].querySelector('input');
    const p = papers[i];
    const val = inp.value;

    if(val === '' || val === undefined){
      alert(`Enter raw for ${p.name}`);
      return;
    }

    const raw = Math.floor(Number(val));
    if(!Number.isInteger(raw) || raw < 0 || raw > p.max){
      alert(`Enter integer raw 0 to ${p.max} for ${p.name}`);
      return;
    }

    a2Sum += raw;
  }

  const totalRaw = estASraw + a2Sum;
  const finalPum = interpRawToPum(subjData.alevel.anchors, totalRaw);
  const grade = pumToGrade(finalPum);

  mainOutput.textContent = `${grade} - ${finalPum} PUM`;

  let pctText = 'N/A';
  if(estASraw > 0){
    const diff = a2Sum - estASraw;
    const pct = Math.round((diff / estASraw) * 100);
    pctText = pct > 0 ? `${pct}% more than AS` : pct < 0 ? `${Math.abs(pct)}% less than AS` : 'Same as AS';
  }

  subOutput.textContent = `Total raw (AS est ${estASraw} + A2 ${a2Sum}) = ${totalRaw} / ${subjData.alevel.max_raw} - ${pctText}`;
  updateTargetInputsWithAchieved(finalPum);
});

calcOverall.addEventListener('click', ()=>{
  const subjData = getSubjData();
  const asVal = Number(asScoreInput.value);
  if(!Number.isInteger(asVal) || asVal < 0 || asVal > 100){
    alert('Enter AS score as integer 0 to 100');
    return;
  }

  const estASraw = interpPumToRawNearest(subjData.as.anchors, asVal);
  const targetPum = parseTargetPum(targetOverall.value);

  if(targetOverall.value.trim() === ''){
    alert('Enter target grade or integer PUM');
    return;
  }
  if(targetPum === null){
    alert('Unknown target');
    return;
  }

  const reqTotalNearest = interpPumToRawNearest(subjData.alevel.anchors, targetPum);
  if(reqTotalNearest === null){
    mainOutput.textContent = 'Error';
    subOutput.textContent = 'Missing data';
    return;
  }

  const reqTotal = Math.ceil(reqTotalNearest);
  const reqA2raw = Math.ceil(reqTotal - estASraw);
  const a2max = subjData.alevel.max_raw - subjData.as.max_raw;

  if(reqA2raw <= 0){
    mainOutput.textContent = 'Already achieved';
    subOutput.textContent = `AS estimate ${estASraw} already meets target ${targetPum}`;
    return;
  }

  if(reqA2raw > a2max){
    mainOutput.textContent = 'Impossible';
    subOutput.textContent = `Required A2 raw ${reqA2raw} exceeds A2 max ${a2max}`;
    return;
  }

  let pctText = 'N/A';
  if(estASraw > 0){
    const diff = reqA2raw - estASraw;
    const pct = Math.round((diff / estASraw) * 100);
    pctText = pct > 0 ? `${pct}% more than AS` : pct < 0 ? `${Math.abs(pct)}% less than AS` : 'Same as AS';
  }

  mainOutput.textContent = `${reqA2raw} raw (A2 required)`;
  subOutput.textContent = `${pctText}. Required total raw (AS + A2): ${reqTotal} / ${subjData.alevel.max_raw}`;
  updateTargetInputsWithAchieved(targetPum);
});

function calcPaperTargetMode(targetInputEl, fixedRawEl, solvedIndex){
  const subjData = getSubjData();
  const papers = subjData.a2_papers || [];

  const asVal = Number(asScoreInput.value);
  if(!Number.isInteger(asVal) || asVal < 0 || asVal > 100){
    alert('Enter AS score as integer 0 to 100');
    return;
  }

  if(papers.length < 2){
    mainOutput.textContent = 'Error';
    subOutput.textContent = 'Need exactly 2 A2 papers configured';
    return;
  }

  const estASraw = interpPumToRawNearest(subjData.as.anchors, asVal);
  const targetPum = parseTargetPum(targetInputEl.value);

  if(targetInputEl.value.trim() === ''){
    alert('Enter target grade or integer PUM');
    return;
  }
  if(targetPum === null){
    alert('Unknown target');
    return;
  }

  const reqTotalNearest = interpPumToRawNearest(subjData.alevel.anchors, targetPum);
  if(reqTotalNearest === null){
    mainOutput.textContent = 'Error';
    subOutput.textContent = 'Missing data';
    return;
  }

  const reqTotal = Math.ceil(reqTotalNearest);
  const fixedPaper = papers[1 - solvedIndex];
  const solvedPaper = papers[solvedIndex];
  const fixedRaw = Number(fixedRawEl.value);

  if(!Number.isInteger(fixedRaw) || fixedRaw < 0 || fixedRaw > fixedPaper.max){
    alert(`Enter integer raw 0 to ${fixedPaper.max} for ${fixedPaper.name}`);
    return;
  }

  const requiredSolved = Math.ceil(reqTotal - estASraw - fixedRaw);

  if(requiredSolved <= 0){
    mainOutput.textContent = 'Already achieved';
    subOutput.textContent = 'Known paper already covers the target.';
    return;
  }

  if(requiredSolved > solvedPaper.max){
    const extra = requiredSolved - solvedPaper.max;
    mainOutput.textContent = 'Impossible';
    subOutput.textContent = `Needs ${requiredSolved} in ${solvedPaper.name} (max ${solvedPaper.max}). Extra ${extra} cannot be covered.`;
    return;
  }

  mainOutput.textContent = `${requiredSolved} raw needed in ${solvedPaper.name}`;
  subOutput.textContent = `Required total raw (AS + A2): ${reqTotal} / ${subjData.alevel.max_raw} (AS raw est: ${estASraw}; fixed ${fixedPaper.name}: ${fixedRaw})`;
  updateTargetInputsWithAchieved(targetPum);
}

calcPaper1Target.addEventListener('click', ()=>{
  calcPaperTargetMode(targetPaper1, paper2Fixed, 0);
});

calcPaper2Target.addEventListener('click', ()=>{
  calcPaperTargetMode(targetPaper2, paper1Fixed, 1);
});
</script>
